<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Cancelled — AURÈLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0A0A; --bone:#F5F2EB; --bone-dim:rgba(245,242,235,0.6);
    --gold:#D4AF37; --line:rgba(245,242,235,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--ink); color:var(--bone); font-family:'Inter',sans-serif; font-weight:200;
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:40px 24px;
  }
  .wrap{max-width:560px;}
  .mono{font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:4px; text-transform:uppercase; color:var(--gold);}
  h1{font-family:'Cormorant Garamond',serif; font-weight:300; font-style:italic; font-size:3rem; margin:24px 0;}
  p{color:var(--bone-dim); line-height:1.8;}
  a.btn{
    display:inline-block; margin-top:36px; padding:16px 40px; border:1px solid var(--line);
    color:var(--bone); text-decoration:none; font-family:'Space Mono',monospace; font-size:0.65rem;
    letter-spacing:3px; text-transform:uppercase; transition:all 0.3s;
  }
  a.btn:hover{border-color:var(--gold); color:var(--gold);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mono">Cancelled</div>
    <h1>Your order was not completed.</h1>
    <p>No payment was taken. Your selection is still saved — you can return and complete checkout whenever you're ready.</p>
    <a class="btn" href="/">Return to Collection</a>
  </div>
</body>
</html>
