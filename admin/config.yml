# === DecapBridge auth ===
# Replace YOUR-GITHUB-USERNAME/YOUR-REPO-NAME and YOUR-SITE-ID below with your real values
# from decapbridge.com before this will work.
backend:
  name: git-gateway
  repo: YOUR-GITHUB-USERNAME/YOUR-REPO-NAME
  branch: main
  identity_url: https://auth.decapbridge.com/sites/YOUR-SITE-ID
  gateway_url: https://gateway.decapbridge.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "categories"
    label: "Categories"
    files:
      - name: "categories"
        label: "Category List"
        file: "categories.json"
        format: "json"
        fields:
          - name: "categories"
            label: "Categories"
            widget: "list"
            collapsed: false
            summary: "{{fields.name}}"
            fields:
              - name: "id"
                label: "ID (used in URLs — lowercase, no spaces, e.g. manteaux)"
                widget: "string"
                hint: "After adding a new category here, also add its ID as an option in the product Category field below."
              - name: "name"
                label: "Display Name"
                widget: "string"
              - name: "tagline"
                label: "Tagline"
                widget: "string"
                required: false

  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Product Catalogue"
        file: "products.json"
        format: "json"
        fields:
          - name: "products"
            label: "Products"
            widget: "list"
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - name: "id"
                label: "ID (unique number)"
                widget: "number"
              - name: "roman"
                label: "Roman Numeral"
                widget: "string"
                required: false
              - name: "name"
                label: "Name"
                widget: "string"
              - name: "cat"
                label: "Category"
                widget: "select"
                hint: "Must match a Category ID exactly. If you added a new category above, add its ID as an option here too."
                options: ["manteaux", "robes", "maille", "tailleur", "accessoires"]
              - name: "price"
                label: "Price (USD)"
                widget: "number"
              - name: "desc"
                label: "Description"
                widget: "text"
                required: false
              - name: "images"
                label: "Photos"
                widget: "list"
                hint: "Upload one or more photos. The first one is used as the cover image everywhere on the site; all of them appear on the product's own page."
                field:
                  name: "src"
                  label: "Photo"
                  widget: "image"
              - name: "grad"
                label: "Fallback Gradient (CSS, used only if no photos are uploaded)"
                widget: "string"
                required: false

  - name: "media_library"
    label: "General Media"
    files:
      - name: "hero_media"
        label: "Homepage Hero & Lookbook"
        file: "media.json"
        format: "json"
        fields:
          - name: "hero_slides"
            label: "Hero Slideshow Photos"
            widget: "list"
            hint: "Upload one or more photos to auto-slide behind the homepage headline. Leave empty to keep the default dark gradient background."
            field:
              name: "src"
              label: "Photo"
              widget: "image"
          - name: "hero_video"
            label: "Hero Background Video (optional, not currently used)"
            widget: "file"
            required: false
          - name: "lookbook_1"
            label: "Lookbook Image 1"
            widget: "image"
            required: false
          - name: "lookbook_2"
            label: "Lookbook Image 2"
            widget: "image"
            required: false
